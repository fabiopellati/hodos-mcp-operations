services:
  hodos-mcp:
    build: .
    ports:
      - "${MCP_PORT:-3100}:3100"
    volumes:
      - "${OPERA_PATH:-.}:/opera"
    environment:
      - PORT=3100
      - OPERA_ROOT=/opera
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    user: "${UID:-1000}:${GID:-1000}"

  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
    working_dir: /app
    user: "1000:1000"
    entrypoint: ["sh"]
    profiles:
      - dev
