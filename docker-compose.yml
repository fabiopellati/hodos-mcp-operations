services:
  hodos-mcp:
    build: .
    ports:
      - "${MCP_PORT:-3100}:3100"
    volumes:
      - "${OPERA_PATH:-.}:/opera"
      - "${HODOS_CONFIG:-./hodos-operations.yml}:/opera/hodos-operations.yml"
      - hodos_rag_state:/var/lib/hodos
      # Esempio di mount paralleli per radici semantiche separate.
      # Da abilitare se si vuole esporre fasi P0-P4 o RFC da un repo
      # diverso da quello della governance. Aggiornare anche la
      # sezione `percorsi:` nel file hodos-operations.yml.
      # - "${FASI_PATH}:/fasi"
      # - "${RFC_PATH}:/rfc"
    environment:
      - PORT=3100
      - OPERA_ROOT=/opera
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    user: "${UID:-1000}:${GID:-1000}"

  qdrant:
    image: qdrant/qdrant:v1.14.0
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    profiles:
      - rag

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    profiles:
      - rag

  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
    working_dir: /app
    user: "1000:1000"
    entrypoint: ["sh"]
    profiles:
      - dev

volumes:
  qdrant_data:
  redis_data:
  hodos_rag_state:
