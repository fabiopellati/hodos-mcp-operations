services:
  hodos-mcp:
    build: .
    ports:
      - "${MCP_PORT:-3100}:3100"
    volumes:
      - "${OPERA_PATH:-.}:/opera"
    environment:
      - PORT=3100
      - OPERA_ROOT=/opera
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    user: "${UID:-1000}:${GID:-1000}"

  qdrant:
    image: qdrant/qdrant:v1.14.0
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    profiles:
      - rag

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    profiles:
      - rag

  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
    working_dir: /app
    user: "1000:1000"
    entrypoint: ["sh"]
    profiles:
      - dev

volumes:
  qdrant_data:
  redis_data:
